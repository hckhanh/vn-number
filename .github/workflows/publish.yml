name: Publish

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yml
    secrets: inherit
    permissions:
      contents: read
      id-token: write
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup toolchains
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
      - name: Setup Socket Firewall
        uses: SocketDev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall
      - name: Install Dependencies
        run: sfw pnpm install
      - name: Update npm
        run: sfw npm install -g npm@latest
      - name: Create Release Pull Request or Publish to npm
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        id: changesets
        with:
          publish: pnpm release
          commitMode: 'github-api'
          title: 'Release new version'
          commit: 'chore(release): bump new version'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to JSR
        run: |
          VERSION=$(node -p "require('./package.json').version")
          jq --arg version "$VERSION" '.version = $version' jsr.json > jsr.json.tmp
          mv jsr.json.tmp jsr.json
          pnpm dlx jsr publish --allow-dirty
        if: steps.changesets.outputs.published == 'true'
